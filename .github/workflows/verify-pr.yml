name: Verify Library PR
on:
  pull_request:
    branches: [ main, master ] # Ensures it triggers regardless of your default branch name

# IMPORTANT: These permissions are required for the GitHub token to merge the PR
permissions:
  contents: write
  pull-requests: write
  actions: write # <-- REQUIRED to trigger other workflows

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      # 1. Standard checkout (prevents the origin/master git error)
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history for all branches so Nx and Git don't crash

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 2. Run install to generate the new package-lock.json
      - name: Install Dependencies
        run: npm i

      # 3. Commit and explicitly push back to the feature branch
      - name: Commit updated package-lock.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add package-lock.json

          # Only commit and push if the file actually changed
          # 'HEAD:${{ github.head_ref }}' guarantees it goes to the PR's feature branch
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update package-lock.json" && git push origin HEAD:${{ github.head_ref }})

      # 4. Run the build
      - run: npx nx run-many -t build

      # 5. Automatically merge the PR and trigger Publish
      - name: Auto-merge and Trigger Publish
        if: startsWith(github.head_ref, 'feature/publish-')
        env:
          GH_TOKEN: ${{ secrets.GIT_PAT }}
        run: |
          echo "1. Merging PR #${{ github.event.pull_request.number }}..."
          gh pr merge ${{ github.event.pull_request.number }} --merge --admin --delete-branch

          echo "2. Extracting Data from PR..."
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_BODY="${{ github.event.pull_request.body }}"

          PROJECT=$(echo "$PR_TITLE" | awk '{print $3}')
          VERSION=$(echo "$PR_TITLE" | awk '{print $5}')

          # FIX: Added '|| true' so the script doesn't crash if JobID isn't found
          JOB_ID=$(echo "$PR_BODY" | grep -oP 'JobID: \K.*' || true)

          echo "Target Project: $PROJECT"
          echo "Target Version: $VERSION"
          echo "Target Job ID: $JOB_ID"

          echo "3. Triggering Publish Pipeline..."

          # FIX: Added '--ref' to specify the branch, and quotes to prevent bash errors
          gh workflow run publish.yml \
            --ref ${{ github.base_ref }} \
            -f project_name="$PROJECT" \
            -f version="$VERSION" \
            -f job_id="$JOB_ID"
