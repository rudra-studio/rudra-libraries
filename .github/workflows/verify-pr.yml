name: Verify Library PR
on:
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      # This runs the build to ensure the React/SCSS syntax is perfectly valid
      - run: npx nx run-many -t build
